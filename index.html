<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بنگی - Deen</title>
    <style>
        :root {
            --bg-color: #0b2219;
            --card-bg: #13382c;
            --accent-green: #2ecc71;
            --text-white: #ffffff;
            --text-gray: #a3b8b0;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 420px;
            background: var(--bg-color);
            padding: 15px;
            box-sizing: border-box;
            border-radius: 35px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            border: 4px solid #1f4e3f;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            padding: 0 10px 10px 10px;
            font-weight: bold;
        }
        .location-box {
            background-color: var(--card-bg);
            padding: 12px 18px;
            border-radius: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .location-select {
            background: transparent;
            color: var(--text-white);
            border: none;
            font-size: 14px;
            font-weight: bold;
            outline: none;
            cursor: pointer;
            width: 180px;
        }
        .location-select option {
            background-color: var(--card-bg);
            color: var(--text-white);
        }
        .prayer-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }
        .prayer-card {
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 12px 5px;
            text-align: center;
        }
        .prayer-card.active {
            border: 2px solid var(--accent-green);
        }
        .prayer-name {
            font-size: 13px;
            color: var(--text-gray);
            margin-bottom: 5px;
        }
        .prayer-time {
            font-size: 14px;
            font-weight: bold;
        }
        .nav-bar {
            display: flex;
            justify-content: space-around;
            background-color: var(--card-bg);
            padding: 12px;
            border-radius: 25px;
            margin-top: 15px;
        }
        .nav-item {
            color: var(--text-gray);
            font-size: 18px;
            cursor: pointer;
        }
        .nav-item.active {
            color: var(--accent-green);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- سەری موبایلێ (Korek و دەمژمێر) -->
        <div class="status-bar">
            <span>3:21</span>
            <span style="color: var(--accent-green); font-size: 12px;">KOREK 📶</span>
        </div>

        <!-- هەلبژارتنا جهـ (هەمی دەڤەرێن کوردستانێ و قەزا) -->
        <div class="location-box">
            <div>
                <div style="font-size: 11px; color: var(--text-gray);">دەڤەرا خۆ هەلبژێرە</div>
                <select class="location-select">
                    <optgroup label="دەڤەرا بادینان">
                        <option value="duhok">دهۆک</option>
                        <option value="zakho">زاخۆ</option>
                        <option value="akre">ئاکرێ</option>
                        <option value="amedi">ئامێدی</option>
                        <option value="semel">سێمێل</option>
                        <option value="bardarash">بەردەڕەش</option>
                        <option value="shekhan">شێخان</option>
                        <option value="ئاكري">ئێلکێ / رۆژئاڤا</option>
                    </optgroup>
                    <optgroup label="دەڤەرا هەولێرێ">
                        <option value="erbil">هەولێر (پایتەخت)</option>
                        <option value="shaqlawa">شەقلاوە</option>
                        <option value="soran">سۆران</option>
                        <option value="rawanduz">ڕەواندز</option>
                        <option value="choman">چۆمان</option>
                        <option value="mergasor">مێرگەسۆر</option>
                        <option value="koya">کۆیە</option>
                        <option value="makhmur">مەخمور</option>
                    </optgroup>
                    <optgroup label="دەڤەرا سۆران و راپەڕین">
                        <option value="raniyah">ڕانیە</option>
                        <option value="qaladiza">قەڵادزێ</option>
                        <option value="piskand">پشدەر</option>
                    </optgroup>
                    <optgroup label="دەڤەرا سلێمانی و دەوروبەر">
                        <option value="sulaymaniyah">سلێمانی</option>
                        <option value="dukan">دووکان</option>
                        <option value="darbandikhan">دەربەندیخان</option>
                        <option value="Kalar">کەلار</option>
                        <option value="Chamchamal">چەمچەماڵ</option>
                        <option value="penjwen">پێنجوێن</option>
                        <option value="halabja">هەڵەبجە</option>
                        <option value="شارەزور">شارەزوور</option>
                    </optgroup>
                    <optgroup label="کەرکووک و گەرمیان">
                        <option value="kirkuk">کەرکووک</option>
                        <option value="tuzkurmatu">توزخورماتوو</option>
                        <option value="khanaqin">خانەقین</option>
                    </optgroup>
                </select>
            </div>
            <div style="font-size: 12px; color: var(--text-gray);">9 صفر 1448</div>
        </div>

        <!-- دەمێن بانگان -->
        <div class="prayer-grid">
            <div class="prayer-card active">
                <div class="prayer-name">سێپێدە</div>
                <div class="prayer-time">3:29 AM</div>
            </div>
            <div class="prayer-card">
                <div class="prayer-name">رۆژ هەلات</div>
                <div class="prayer-time">5:14 AM</div>
            </div>
            <div class="prayer-card">
                <div class="prayer-name">نێڤرۆ</div>
                <div class="prayer-time">12:22 PM</div>
            </div>
            <div class="prayer-card">
                <div class="prayer-name">عەسر</div>
                <div class="prayer-time">4:09 PM</div>
            </div>
            <div class="prayer-card">
                <div class="prayer-name">مەغریب</div>
                <div class="prayer-time">7:27 PM</div>
            </div>
            <div class="prayer-card">
                <div class="prayer-name">عەیشا</div>
                <div class="prayer-time">8:53 PM</div>
            </div>
        </div>

        <!-- ناڤیگاسیۆنا خوارێ -->
        <div class="nav-bar">
            <div class="nav-item">⚙️</div>
            <div class="nav-item">❤️</div>
            <div class="nav-item">🕒</div>
            <div class="nav-item">📖</div>
            <div class="nav-item active">🏠</div>
        </div>
    </div>

</body>
</html>
